workflows:
  ios-swift-app:
    name: Carrom AI Coach iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Build and Test iOS App
        script: |
          # Build package targeting iOS Simulator (iPhone 15 Plus) directly
          xcodebuild build -scheme CarromAICoach -destination 'platform=iOS Simulator,name=iPhone 15 Plus'
    artifacts:
      - .build/debug/*.a
      - .build/release/*.a
