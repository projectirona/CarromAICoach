workflows:
  ios-swift-app:
    name: Carrom AI Coach iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1
    environment:
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Build and Test iOS App
        script: |
          # Build package targeting iOS Simulator (iPhone 17 Pro Max) which is available on host
          xcodebuild build -scheme CarromAICoach -destination 'platform=iOS Simulator,name=iPhone 17 Pro Max'
    artifacts:
      - .build/debug/*.a
      - .build/release/*.a
